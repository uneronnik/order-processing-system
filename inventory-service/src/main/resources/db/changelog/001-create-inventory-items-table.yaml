databaseChangeLog:
  - changeSet:
      id: 001-create-inventory-table
      author: fomenko
      changes:
        - createTable:
            tableName: inventory-items
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: product_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: total_quantity
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: reserved_quantity
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: decimal(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: now()
