databaseChangeLog:
  - changeSet:
      id: 002-create-order-reservations-table
      author: fomenko
      changes:
        - createTable:
            tableName: order_reservations
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: order_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: product_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: reserved_at
                  type: timestamp
                  defaultValueComputed: now()